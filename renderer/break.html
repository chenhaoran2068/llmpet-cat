<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="break.css" />
  <title>猫猫小憩</title>
</head>
<body>
  <main class="card">
    <img src="../assets/cat/candidate-01.gif" alt="猫猫" />
    <section>
      <p class="eyebrow">猫猫邀请你小憩一下</p>
      <h1>连续工作 40 分钟了哦</h1>
      <p class="copy">选一个 30 秒小休息，让肉肉和脑袋一起回回血。提醒会停留 5 分钟，也可以随时关闭。</p>
      <div id="choices" class="choices">
        <button data-action="breathe">🌿 呼吸 30 秒</button>
        <button data-action="water">💧 喝一口水</button>
        <button data-action="find">🐾 找找躲起来的猫</button>
        <button class="close" data-action="close">收起提醒</button>
      </div>
      <div id="find-game" class="find-game hidden"><button id="cat-spot" aria-label="找到的猫猫">🐱</button></div>
      <p id="result" class="note">鼠标就点一下，这次休息只属于你。</p>
    </section>
  </main>
  <script src="break.js"></script>
</body>
</html>
