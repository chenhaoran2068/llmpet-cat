<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="pet.css" />
  <title>LLMPET Cat</title>
</head>
<body>
  <main id="stage">
    <div id="ambience" class="ambience" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i></div>
    <div id="task-bubbles" class="task-bubbles hidden" aria-label="并行 Codex 会话"></div>
    <div id="bubble" class="bubble hidden">
      <div id="bubble-title" class="bubble-title"></div>
      <div id="bubble-detail" class="bubble-detail"></div>
    </div>
    <div id="focus-pact" class="focus-pact hidden" aria-live="polite"><span>🧶 猫猫专注契约</span><b id="focus-time">25:00</b></div>
    <div id="help-sign" class="help-sign hidden">🙋 这一步需要你决定哦</div>
    <button id="next-note" class="next-note hidden" type="button">📌 <span>去回复 Codex</span></button>
    <section id="sessions" class="panel hidden">
      <header><span>Codex 会话</span><span><button id="notes-toggle" title="猫猫便签">便签</button><button id="close">×</button></span></header>
      <div id="session-summary" class="session-summary" aria-live="polite"></div>
      <div id="session-list"></div>
      <div class="focus-actions"><span>🧶 陪我专注</span><button id="focus-25">25 分钟</button><button id="focus-50">50 分钟</button></div>
      <div class="pet-preferences"><button id="mood-toggle" type="button">🎞️ 均衡</button><button id="quiet-toggle" type="button">🌙 安静时段</button><button id="click-through-toggle" type="button">🫧 点击穿透</button></div>
      <section id="notes-panel" class="notes-panel hidden">
        <h2>猫猫便签</h2>
        <div class="note-compose"><input id="note-input" maxlength="72" placeholder="写下一件要做的小事…" /><button id="note-add">记下</button></div>
        <div id="note-list" class="note-list"></div>
      </section>
      <footer><button id="hide">隐藏猫猫</button><button id="quit">退出</button></footer>
    </section>
    <div id="done-stamp" class="done-stamp hidden">任务完成！</div>
    <div id="error-box" class="error-box hidden"><span>📦</span><b>再试一次</b></div>
    <div id="status" class="status">待机中</div>
    <div id="cat" class="cat" title="点击查看 Codex 会话">
      <div id="work-prop" class="work-prop hidden" aria-hidden="true"></div>
      <img id="cat-img" src="../assets/cat/cat-idle.gif" alt="猫猫桌宠" draggable="false" />
      <img id="belly-img" class="belly-img" src="../assets/cat/cat-belly-play.png" alt="猫猫露出肚肚" draggable="false" />
    </div>
  </main>
  <script src="pet.js"></script>
</body>
</html>
