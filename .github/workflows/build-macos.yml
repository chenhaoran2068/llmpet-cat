name: Build macOS test package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - run: pnpm package:mac
      - name: Upload unsigned macOS package
        uses: actions/upload-artifact@v4
        with:
          name: LLMPET-Cat-macos-test
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error
          retention-days: 14
